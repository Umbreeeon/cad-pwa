<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stanton CAD (Star Citizen)</title>
  <style>
    :root{
      --bg:#0b0f14;
      --text:#e7eefb;
      --muted:#93a4c7;
      --line:#223148;
      --accent:#ff4d6d;
      --good:#4ade80;
      --warn:#fbbf24;
      --bad:#fb7185;
      --shadow: 0 12px 24px rgba(0,0,0,.35);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 20% -20%, rgba(255,77,109,.18), transparent 60%),
                  radial-gradient(900px 700px at 100% 0%, rgba(74,222,128,.10), transparent 60%),
                  var(--bg);
      color:var(--text);
      font-family:var(--sans);
    }
    .wrap{max-width:1180px;margin:0 auto;padding:22px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;border:1px solid var(--line);background:rgba(15,23,34,.72);
      border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter: blur(8px);
      position:sticky;top:12px;z-index:10;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:40px;height:40px;border-radius:12px;
      background: linear-gradient(135deg, rgba(255,77,109,.70), rgba(99,179,255,.18));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
    }
    .brand h1{font-size:16px;margin:0;line-height:1.1}
    .brand .sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
    .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:999px;
      background:rgba(23,35,53,.9);border:1px solid var(--line);color:var(--muted);
      font-size:12px;
    }
    .btn{
      cursor:pointer;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(18,29,43,.95), rgba(15,23,34,.95));
      color:var(--text);
      padding:9px 12px;border-radius:12px;
      font-weight:600;font-size:13px;
      box-shadow: 0 10px 16px rgba(0,0,0,.18);
    }
    .btn:hover{border-color:rgba(255,77,109,.35)}
    .btn.primary{
      background: linear-gradient(180deg, rgba(255,77,109,.22), rgba(18,29,43,.95));
      border-color:rgba(255,77,109,.42);
    }
    .btn.danger{
      background: linear-gradient(180deg, rgba(251,113,133,.18), rgba(18,29,43,.95));
      border-color:rgba(251,113,133,.35);
    }

    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:16px;
      align-items:start;
    }
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} }

    .panel{
      border:1px solid var(--line);
      background:rgba(15,23,34,.72);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel .hd{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:12px 14px;border-bottom:1px solid var(--line);
      background: linear-gradient(180deg, rgba(18,29,43,.75), rgba(15,23,34,.35));
    }
    .panel .hd h2{margin:0;font-size:13px;letter-spacing:.3px;color:var(--muted);text-transform:uppercase}
    .panel .bd{padding:12px 14px}

    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{
      padding:8px 10px;border-radius:999px;
      border:1px solid var(--line);background:rgba(23,35,53,.7);
      color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
    }
    .tab.active{
      color:var(--text);
      border-color:rgba(255,77,109,.45);
      box-shadow: 0 0 0 3px rgba(255,77,109,.12) inset;
    }

    .card{
      border:1px solid var(--line);
      background:rgba(18,29,43,.50);
      border-radius:var(--radius);
      padding:12px;
      transition: border-color .15s ease;
    }
    .card:hover{border-color: rgba(255,77,109,.35)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;flex:1;min-width: 140px}
    label{font-size:12px;color:var(--muted)}
    input, select, textarea{
      width:100%;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(10,14,20,.65);
      color:var(--text);
      outline:none;
      font-size:13px;
    }
    textarea{min-height:92px;resize:vertical}
    input:focus, select:focus, textarea:focus{
      border-color:rgba(255,77,109,.55);
      box-shadow:0 0 0 3px rgba(255,77,109,.12)
    }
    .help{font-size:12px;color:var(--muted);line-height:1.4}
    .hr{height:1px;background:var(--line);margin:10px 0}

    .rightCol{display:flex;flex-direction:column;gap:16px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .search{flex:1;min-width: 220px}
    .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
    .k{padding:10px;border-radius:14px;border:1px solid var(--line);background:rgba(18,29,43,.55)}
    .k .n{font-size:18px;font-weight:800}
    .k .t{font-size:12px;color:var(--muted);margin-top:2px}

    .badge{
      font-size:11px;font-weight:800;
      padding:4px 8px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(23,35,53,.75);
      color:var(--muted);
      font-family:var(--mono);
      display:inline-block;
    }
    .badge.good{border-color:rgba(74,222,128,.35);color:rgba(74,222,128,.95)}
    .badge.warn{border-color:rgba(251,191,36,.35);color:rgba(251,191,36,.95)}
    .badge.bad{border-color:rgba(251,113,133,.35);color:rgba(251,113,133,.95)}

    .title .main{font-weight:900;font-size:13px}
    .title .sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:4px}
    .mini{font-size:12px;line-height:1.45}
    .muted{color:var(--muted)}
    .mono{font-family:var(--mono)}
    .list{display:flex;flex-direction:column;gap:10px}

    .pill{
      padding:4px 8px;border-radius:999px;border:1px solid var(--line);
      background:rgba(23,35,53,.7);color:var(--muted);font-size:11px;font-weight:800;font-family:var(--mono);
      display:inline-block;margin:3px 4px 0 0;
    }

    .toast{
      position:fixed;right:14px;bottom:14px;
      padding:10px 12px;border-radius:14px;border:1px solid var(--line);
      background:rgba(15,23,34,.85);box-shadow:var(--shadow);
      color:var(--text);font-size:13px;display:none;max-width: 360px;
      z-index:100;
    }

    .dialogBackdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.55);
      display:none;align-items:center;justify-content:center;padding:18px;z-index:200;
    }
    .dialog{
      max-width:980px;width:100%;
      border:1px solid var(--line);
      background:rgba(15,23,34,.92);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      max-height: 88vh;
      display:flex;
      flex-direction:column;
    }
    .dialog .hd{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .dialog .hd h3{margin:0;font-size:14px}
    .dialog .bd{padding:12px 14px;overflow:auto}
    .dialog .ft{padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

    .split{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    @media (max-width: 760px){ .split{grid-template-columns:1fr} }

    .errorBanner{
      display:none;
      margin:14px 0 0;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(251,113,133,.45);
      background: rgba(251,113,133,.10);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size:12px;
      line-height:1.4;
    }

    .reportBox{
      width:100%;
      min-height:260px;
      font-family:var(--mono);
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
    }
    .smallNote{font-size:11px;color:var(--muted);margin-top:6px}
  </style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Stanton CAD</h1>
        <div class="sub">MEDRUNNER-STYLE DISPATCH • STAR CITIZEN</div>
      </div>
    </div>
    <div class="actions">
      <span class="chip" id="sessionChip">Not logged in</span>
      <button class="btn primary" id="btnOpenLogin">Login</button>
      <button class="btn danger" id="btnLogout" style="display:none">Logout</button>
    </div>
  </div>

  <div class="errorBanner" id="errorBanner"></div>

  <div class="grid">
    <div class="panel">
      <div class="hd">
        <h2>Console</h2>
        <div class="tabs" id="tabs"></div>
      </div>
      <div class="bd" id="leftContent"></div>
    </div>

    <div class="rightCol">
      <div class="panel">
        <div class="hd">
          <h2>Live Board</h2>
          <div class="toolbar">
            <input class="search" id="search" placeholder="Search calls, units, people..." />
            <select id="boardMode" style="max-width:220px">
              <option value="calls">Calls</option>
              <option value="units">Units</option>
              <option value="people">People</option>
              <option value="log">Log</option>
            </select>
          </div>
        </div>
        <div class="bd">
          <div class="kpi">
            <div class="k"><div class="n" id="kOpen">0</div><div class="t">Open Calls</div></div>
            <div class="k"><div class="n" id="kDispatched">0</div><div class="t">Dispatched</div></div>
            <div class="k"><div class="n" id="kUnitsAvail">0</div><div class="t">Units Available</div></div>
          </div>
          <div class="hr"></div>
          <div id="board"></div>
        </div>
      </div>

      <div class="panel">
        <div class="hd">
          <h2>Audit Log</h2>
          <span class="badge" id="logHint">Last 30 actions</span>
        </div>
        <div class="bd">
          <div class="list" id="log"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="dialogBackdrop" id="dlgBackdrop">
  <div class="dialog">
    <div class="hd">
      <h3 id="dlgTitle">Dialog</h3>
      <button class="btn" id="btnCloseDlg">Close</button>
    </div>
    <div class="bd" id="dlgBody"></div>
    <div class="ft" id="dlgFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const $ = (id) => document.getElementById(id);

  window.addEventListener("error", (e) => {
    const b = $("errorBanner");
    b.style.display = "block";
    b.textContent = "CAD script error: " + (e?.message || "unknown") + " — refresh the page. If this persists, tell me the exact message.";
  });

  const UI = {
    sessionChip: $("sessionChip"),
    btnOpenLogin: $("btnOpenLogin"),
    btnLogout: $("btnLogout"),
    tabs: $("tabs"),
    leftContent: $("leftContent"),

    search: $("search"),
    boardMode: $("boardMode"),
    board: $("board"),

    kOpen: $("kOpen"),
    kDispatched: $("kDispatched"),
    kUnitsAvail: $("kUnitsAvail"),

    log: $("log"),

    dlgBackdrop: $("dlgBackdrop"),
    dlgTitle: $("dlgTitle"),
    dlgBody: $("dlgBody"),
    dlgFoot: $("dlgFoot"),
    btnCloseDlg: $("btnCloseDlg"),

    toast: $("toast"),
  };

  const LS = { accounts: "sc_cad_accounts_v5", session: "sc_cad_session_v5" };
  const userKey = (u) => `sc_cad_user_${u}_v5`;

  const TABS = [
    { id:"newCall", label:"New Call" },
    { id:"dispatch", label:"Dispatch" },
    { id:"units", label:"Units" },
    { id:"people", label:"People" },
    { id:"settings", label:"Settings" },
  ];

  const SC_LOCATIONS = {
    "Stanton": {
      "Landing Zones": ["Area18 (ArcCorp)","Lorville (Hurston)","Orison (Crusader)","New Babbage (microTech)"],
      "Planets & Moons": [
        "Hurston","Hurston → Arial","Hurston → Aberdeen","Hurston → Magda","Hurston → Ita",
        "Crusader","Crusader → Cellin","Crusader → Daymar","Crusader → Yela",
        "ArcCorp","ArcCorp → Lyria","ArcCorp → Wala",
        "microTech","microTech → Calliope","microTech → Clio","microTech → Euterpe"
      ],
      "Orbital Stations": [
        "Everus Harbor (Hurston)","Seraphim Station (Crusader)","Baijini Point (ArcCorp)",
        "Port Tressler (microTech)","Grim HEX (Yela)","Security Post Kareah"
      ],
      "Lagrange Stations (L1–L5)": [
        "ARC-L1 Wide Forest Station","ARC-L2 Lively Pathway Station","ARC-L3 Modern Express Station",
        "ARC-L4 Faint Glen Station","ARC-L5 Yellow Core Station",
        "CRU-L1 Ambitious Dream Station","CRU-L2 (R&R CRU-L2)","CRU-L3 Sparkling Way Station",
        "CRU-L4 Shallow Fields Station","CRU-L5 Beautiful Glen Station",
        "HUR-L1 Green Glade Station","HUR-L2 Faithful Dream Station","HUR-L3 Thundering Express Station",
        "HUR-L4 Melodic Fields Station","HUR-L5 High Course Station",
        "MIC-L1 Shallow Frontier Station","MIC-L2 Long Forest Station","MIC-L3 Endless Odyssey Station",
        "MIC-L4 Red Crossroads Station","MIC-L5 Modern Icarus Station"
      ]
    },
    "Pyro": {
      "Planets": ["Pyro I","Monox (Pyro II)","Bloom (Pyro III)","Pyro IV","Pyro V","Terminus (Pyro VI)"],
      "Stations": ["Ruin Station (Terminus / Pyro VI)","Checkmate Station (Monox / Pyro II L4)","Orbituary"],
      "Contested Zones": ["Ruin Station Contested Zone","Checkmate Contested Zone","Orbituary Contested Zone"]
    }
  };

  let activeTab = "newCall";
  let accounts = loadJSON(LS.accounts, {});
  let session = loadJSON(LS.session, null);
  let data = null;

  syncSession();
  bindGlobal();
  renderTabs();
  renderAll();

  function syncSession(){
    if(session?.username && accounts[session.username]){
      data = loadJSON(userKey(session.username), null) || freshUserData();
      normalizeData();
    } else {
      session = null;
      saveJSON(LS.session, null);
      data = null;
    }
    renderTopbar();
  }

  function normalizeData(){
    data.calls ??= [];
    data.units ??= [];
    data.people ??= [];
    data.log ??= [];
    data.nextId ??= 1000;

    for(const c of data.calls){
      c.details ??= "";
      c.system ??= "Stanton";
      c.status ??= "OPEN";
      c.assignedUnitIds ??= [];
      c.linkedPeopleIds ??= [];
      c.updates ??= [];
      c.aar ??= {
        commandSummary: "",
        aoNotes: "",
        threatsPveCount: 0,
        threatsPveNotes: "",
        threatsPvpCount: 0,
        threatsPvpNotes: "",
        actionsTaken: "",
        medical: "",
        extraction: "",
        outcome: "",
        rtbDebrief: ""
      };
    }
    for(const p of data.people){
      p.org ??= "";
      p.tags ??= "";
      p.notes ??= [];
    }
    for(const u of data.units){
      u.notes ??= "";
      u.status ??= "AVAILABLE";
      u.type ??= "PATROL";
    }
  }

  function freshUserData(){
    return { calls: [], units: [], people: [], log: [], nextId: 1000 };
  }

  function persist(){
    if(!session?.username) return;
    saveJSON(userKey(session.username), data);
    saveJSON(LS.accounts, accounts);
    saveJSON(LS.session, session);
  }

  function renderTopbar(){
    const loggedIn = !!session?.username;
    UI.sessionChip.textContent = loggedIn ? `Signed in: ${session.username}` : "Not logged in";
    UI.btnOpenLogin.style.display = loggedIn ? "none" : "";
    UI.btnLogout.style.display = loggedIn ? "" : "none";
  }

  function renderTabs(){
    UI.tabs.innerHTML = "";
    TABS.forEach(t => {
      const b = document.createElement("button");
      b.className = "tab" + (t.id === activeTab ? " active" : "");
      b.textContent = t.label;
      b.addEventListener("click", () => { activeTab = t.id; renderTabs(); renderLeft(); });
      UI.tabs.appendChild(b);
    });
  }

  function renderAll(){ renderLeft(); renderBoard(); renderKPIs(); renderAuditLog(); }

  function renderLeft(){
    if(!session?.username){
      UI.leftContent.innerHTML = `
        <div class="card">
          <div class="title">
            <div class="main">Login required</div>
            <div class="sub">This CAD stores data locally in your browser.</div>
          </div>
          <div class="hr"></div>
          <div class="help">Click Login in the top right.</div>
          <div style="margin-top:10px">
            <button class="btn primary" id="btnInlineLogin">Open Login</button>
          </div>
        </div>`;
      $("btnInlineLogin").addEventListener("click", openLoginDialog);
      return;
    }

    if(activeTab === "newCall") UI.leftContent.innerHTML = viewNewCall();
    if(activeTab === "dispatch") UI.leftContent.innerHTML = viewDispatch();
    if(activeTab === "units") UI.leftContent.innerHTML = viewUnits();
    if(activeTab === "people") UI.leftContent.innerHTML = viewPeople();
    if(activeTab === "settings") UI.leftContent.innerHTML = viewSettings();
    bindLeft();
  }

  function renderBoard(){
    if(!session?.username){ UI.board.innerHTML = `<div class="help">Sign in to see the live board.</div>`; return; }
    const q = (UI.search.value || "").trim().toLowerCase();
    const mode = UI.boardMode.value;

    if(mode === "calls"){
      const calls = [...data.calls].sort((a,b)=> b.createdAt - a.createdAt).filter(c => callBlob(c).includes(q));
      UI.board.innerHTML = calls.length ? calls.map(callCard).join("") : `<div class="help">No calls yet.</div>`;
      calls.forEach(c => { const el = $("openCall_"+c.id); if(el) el.addEventListener("click", () => openCallDetails(c.id)); });
    }
    if(mode === "units"){
      const units = [...data.units].sort((a,b)=> a.name.localeCompare(b.name))
        .filter(u => (u.name+" "+u.type+" "+u.status+" "+(u.notes||"")).toLowerCase().includes(q));
      UI.board.innerHTML = units.length ? units.map(unitCard).join("") : `<div class="help">No units yet.</div>`;
    }
    if(mode === "people"){
      const ppl = [...data.people].sort((a,b)=> a.handle.localeCompare(b.handle))
        .filter(p => (p.handle+" "+(p.org||"")+" "+(p.tags||"")+" "+notesText(p)).toLowerCase().includes(q));
      UI.board.innerHTML = ppl.length ? ppl.map(personCard).join("") : `<div class="help">No people yet.</div>`;
    }
    if(mode === "log"){ renderAuditLog(true); UI.board.innerHTML = UI.log.innerHTML; }
  }

  function renderKPIs(){
    if(!session?.username){ UI.kOpen.textContent="0"; UI.kDispatched.textContent="0"; UI.kUnitsAvail.textContent="0"; return; }
    UI.kOpen.textContent = String(data.calls.filter(c => c.status === "OPEN").length);
    UI.kDispatched.textContent = String(data.calls.filter(c => ["DISPATCHED","ON_SCENE"].includes(c.status)).length);
    UI.kUnitsAvail.textContent = String(data.units.filter(u => u.status === "AVAILABLE").length);
  }

  function renderAuditLog(skipBoard){
    if(!session?.username){ UI.log.innerHTML = `<div class="help">No log available.</div>`; return; }
    const items = [...data.log].sort((a,b)=> b.at - a.at).slice(0,30);
    UI.log.innerHTML = items.length ? items.map(l => `
      <div class="card">
        <div class="mini"><span class="mono">${fmtTime(l.at)}</span> — <b>${esc(l.by)}</b></div>
        <div class="mini muted" style="margin-top:6px">${esc(l.action)}</div>
      </div>`).join("") : `<div class="help">No actions yet.</div>`;
    if(!skipBoard && UI.boardMode.value === "log") UI.board.innerHTML = UI.log.innerHTML;
  }

  // Views
  function viewNewCall(){
    return `
      <div class="card">
        <div class="title"><div class="main">Create Call</div><div class="sub">Medrunner-style quick intake</div></div>
        <div class="hr"></div>
        <div class="row">
          <div class="field">
            <label>Call Type</label>
            <select id="callType">
              <option>Distress Beacon</option>
              <option>Medical Emergency</option>
              <option>Armed Contact / Hostiles</option>
              <option>Piracy / Nine Tails Activity</option>
              <option>Search & Rescue</option>
              <option>Escort Request</option>
              <option>Station / Port Incident</option>
              <option>Ground Bunker Incident</option>
              <option>Custom...</option>
            </select>
          </div>
          <div class="field">
            <label>Priority</label>
            <select id="callPriority">
              <option value="LOW">LOW</option>
              <option value="MED" selected>MED</option>
              <option value="HIGH">HIGH</option>
              <option value="CRITICAL">CRITICAL</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field"><label>System</label><select id="sysSelect"></select></div>
          <div class="field"><label>Location</label><select id="locSelect"></select></div>
        </div>

        <div class="field">
          <label>Custom Location (optional)</label>
          <input id="callLocationCustom" placeholder="Type if not listed (e.g. outpost/cave/wreck)" />
        </div>

        <div class="field">
          <label>Details</label>
          <textarea id="callDetails" placeholder="Threats, injuries, ship type, last known, comms status..."></textarea>
        </div>

        <div class="row">
          <button class="btn primary" id="btnCreateCall">Create Call</button>
          <button class="btn" id="btnSample">Add Sample Data</button>
        </div>
      </div>`;
  }

  function viewDispatch(){
    const callOpts = data.calls.filter(c => c.status !== "CLOSED")
      .sort((a,b)=>b.createdAt-a.createdAt)

  function bindLeft(){
    if(activeTab === "newCall"){
      buildLocationDropdowns();

      $("btnCreateCall").addEventListener("click", () => {
        const type = $("callType").value;
        const priority = $("callPriority").value;
        const sysPick = $("sysSelect").value;
        const locPick = $("locSelect").value;

        const locCustom = $("callLocationCustom").value.trim();
        const location = (locCustom || locPick || "").trim();
        const details = $("callDetails").value.trim();
        if(!location){ toast("Location is required."); return; }

        const call = {
          id: newId("C"),
          createdAt: Date.now(),
          createdBy: session.username,
          status: "OPEN",
          system: sysPick || "Stanton",
          type: type === "Custom..." ? "Custom" : type,
          priority,
          location,
          details,
          assignedUnitIds: [],
          linkedPeopleIds: [],
          updates: [{ at: Date.now(), by: "SYSTEM", text: "Call created." }],
          aar: {
            commandSummary: "",
            aoNotes: "",
            threatsPveCount: 0,
            threatsPveNotes: "",
            threatsPvpCount: 0,
            threatsPvpNotes: "",
            actionsTaken: "",
            medical: "",
            extraction: "",
            outcome: "",
            rtbDebrief: ""
          }
        };

        data.calls.push(call);
        addLog(`Created call ${call.id} (${call.type}) @ ${call.location}`);
        persist();
        toast("Call created.");
        $("callLocationCustom").value = "";
        $("callDetails").value = "";
        renderAll();
      });

      $("btnSample").addEventListener("click", () => { seedSample(); persist(); toast("Sample data added."); renderAll(); });
    }

    if(activeTab === "dispatch"){
      $("btnAssign")?.addEventListener("click", () => {
        const call = getCall($("dCall")?.value);
        const unit = getUnit($("dUnit")?.value);
        if(!call || !unit){ toast("Need a call and a unit."); return; }
        assignUnitToCall(call.id, unit.id);
        toast("Assigned.");
        renderAll();
      });

      $("btnUnassign")?.addEventListener("click", () => {
        const call = getCall($("dCall")?.value);
        const unit = getUnit($("dUnit")?.value);
        if(!call || !unit){ toast("Select call and unit."); return; }
        unassignUnitFromCall(call.id, unit.id);
        toast("Unassigned.");
        renderAll();
      });

      $("btnSetStatus")?.addEventListener("click", () => {
        const call = getCall($("dCall")?.value);
        if(!call){ toast("Select call."); return; }
        setCallStatus(call.id, $("dStatus").value);
        toast("Status updated.");
        renderAll();
      });
    }

    if(activeTab === "units"){
      $("btnAddUnit")?.addEventListener("click", () => {
        const name = $("uName").value.trim();
        if(!name){ toast("Unit name required."); return; }
        const unit = { id: newId("U"), name, type: $("uType").value, status: $("uStatus").value, notes: $("uNotes").value.trim() };
        data.units.push(unit);
        addLog(`Added unit ${unit.name} (${unit.type})`);
        persist();
        renderAll();
        toast("Unit added.");
        $("uName").value = ""; $("uNotes").value = "";
      });
    }

    if(activeTab === "people"){
      $("btnAddPerson")?.addEventListener("click", () => {
        const handle = $("pHandle").value.trim();
        if(!handle){ toast("Handle/name required."); return; }
        const p = { id: newId("P"), handle, org: $("pOrg").value.trim(), tags: $("pTags").value.trim(), notes: [] };
        data.people.push(p);
        addLog(`Added person profile: ${p.handle}`);
        persist();
        renderAll();
        toast("Person added.");
        $("pHandle").value = ""; $("pOrg").value = ""; $("pTags").value = "";
      });

      $("btnAddNote")?.addEventListener("click", () => {
        const p = getPerson($("pSel")?.value);
        const text = $("pNote").value.trim();
        if(!p){ toast("Select a person."); return; }
        if(!text){ toast("Enter a note."); return; }
        p.notes.unshift({ at: Date.now(), by: session.username, text });
        addLog(`Added note to ${p.handle}`);
        persist();
        renderAll();
        toast("Note added.");
        $("pNote").value = "";
      });
    }

    if(activeTab === "settings"){
      $("btnExport")?.addEventListener("click", () => download(`stanton-cad_${session.username}.json`, JSON.stringify(data,null,2), "application/json"));
      $("btnImport")?.addEventListener("click", importJSON);
      $("btnWipe")?.addEventListener("click", () => {
        if(!confirm("Wipe all your data?")) return;
        data = freshUserData(); normalizeData();
        addLog("Wiped user data"); persist(); renderAll(); toast("Wiped.");
      });
    }
  }

  function openLoginDialog(){
    UI.dlgTitle.textContent = "Login / Create Account";
    UI.dlgBody.innerHTML = `
      <div class="card">
        <div class="help">Accounts are stored locally (browser). Use any password.</div>
        <div class="hr"></div>
        <div class="row">
          <div class="field"><label>Username</label><input id="lgUser" placeholder="Dispatcher1" /></div>
          <div class="field"><label>Password</label><input id="lgPass" type="password" placeholder="••••••••" /></div>
        </div>
        <div class="row">
          <button class="btn primary" id="dlgLogin">Login</button>
          <button class="btn" id="dlgCreate">Create</button>
        </div>
        <div class="hr"></div>
        <div class="mini muted">Users on this device: <span class="mono">${Object.keys(accounts).join(", ") || "(none)"}</span></div>
      </div>`;
    UI.dlgFoot.innerHTML = "";
    UI.dlgBackdrop.style.display = "flex";

    $("dlgLogin").addEventListener("click", () => {
      const u = $("lgUser").value.trim(), p = $("lgPass").value;
      if(!u || !p) return toast("Enter username + password.");
      if(!accounts[u] || accounts[u].password !== p) return toast("Invalid login.");
      session = { username: u };
      saveJSON(LS.session, session);
      data = loadJSON(userKey(u), null) || freshUserData();
      normalizeData();
      addLog("Logged in");
      persist();
      closeDialog();
      renderTopbar();
      renderAll();
      toast("Welcome.");
    });

    $("dlgCreate").addEventListener("click", () => {
      const u = $("lgUser").value.trim(), p = $("lgPass").value;
      if(!u || !p) return toast("Enter username + password.");
      if(accounts[u]) return toast("Username already exists.");
      accounts[u] = { password: p, createdAt: Date.now() };
      saveJSON(LS.accounts, accounts);
      session = { username: u };
      saveJSON(LS.session, session);
      data = freshUserData();
      normalizeData();
      addLog("Account created");
      persist();
      closeDialog();
      renderTopbar();
      renderAll();
      toast("Account created.");
    });
  }

  // Report Dialog
  function openReportDialog(callId){
    const c = getCall(callId);
    if(!c) return;
    const report = generateAfterActionReport(c);

    UI.dlgTitle.textContent = `After Action Report — ${c.id}`;
    UI.dlgBody.innerHTML = `
      <div class="card">
        <div class="help">Generated from call fields + AAR fields + units + people + updates.</div>
        <div class="hr"></div>
        <textarea class="reportBox" id="reportText">${esc(report)}</textarea>
      </div>
    `;
    UI.dlgFoot.innerHTML = `
      <button class="btn" id="btnCopyReport">Copy</button>
      <button class="btn" id="btnDownloadReport">Download .txt</button>
      <button class="btn primary" id="btnBackToCall">Back to Call</button>
    `;
    UI.dlgBackdrop.style.display = "flex";

    $("btnCopyReport").addEventListener("click", async () => {
      try{ await navigator.clipboard.writeText(report); toast("Report copied."); }
      catch{ toast("Copy failed. Select text and copy manually."); }
    });

    $("btnDownloadReport").addEventListener("click", () => {
      download(`${c.id}_after_action_report.txt`, report, "text/plain");
      toast("Downloaded.");
    });

    $("btnBackToCall").addEventListener("click", () => { closeDialog(); openCallDetails(c.id); });
  }

  function generateAfterActionReport(c){
    const au = (c.assignedUnitIds||[]).map(id => getUnit(id)).filter(Boolean);
    const ap = (c.linkedPeopleIds||[]).map(id => getPerson(id)).filter(Boolean);

    const assignedUnits = au.map(u => `${u.name} (${u.type}) — ${u.status}${u.notes?` — ${u.notes}`:""}`);
    const linkedPeople = ap.map(p => `${p.handle}${p.org?` (${p.org})`:""}${p.tags?` [${p.tags}]`:""}`);

    const updates = (c.updates||[]).slice().sort((a,b)=>a.at-b.at)
      .map(u => `- ${fmtTime(u.at)} — ${u.by}: ${u.text}`);

    const aar = c.aar || {};
    const pveCount = Number(aar.threatsPveCount || 0);
    const pvpCount = Number(aar.threatsPvpCount || 0);

    const lines = [];
    lines.push("MEDRUNNER / SECURITY — AFTER ACTION REPORT");
    lines.push("=".repeat(68));
    lines.push(`CALL ID:        ${c.id}`);
    lines.push(`TYPE:           ${c.type}`);
    lines.push(`PRIORITY:       ${c.priority}`);
    lines.push(`STATUS:         ${c.status}`);
    lines.push(`SYSTEM:         ${c.system || ""}`);
    lines.push(`LOCATION:       ${c.location}`);
    lines.push(`DISPATCH TIME:  ${fmtTime(c.createdAt)}`);
    lines.push(`DISPATCHER:     ${c.createdBy}`);
    lines.push("-".repeat(68));

    lines.push("COMMAND SUMMARY:");
    lines.push(blankOrWrap(aar.commandSummary, 68));

    lines.push("-".repeat(68));
    lines.push("DISPATCH INFO:");
    lines.push(blankOrWrap(c.details, 68));

    lines.push("-".repeat(68));
    lines.push("AO / LOCATION:");
    lines.push(blankOrWrap(aar.aoNotes, 68));

    lines.push("-".repeat(68));
    lines.push("THREATS:");
    lines.push(`PvE Threats: ${pveCount}`);
    lines.push(blankOrWrap(aar.threatsPveNotes, 68, true));
    lines.push("");
    lines.push(`PvP Threats: ${pvpCount}`);
    lines.push(blankOrWrap(aar.threatsPvpNotes, 68, true));

    lines.push("-".repeat(68));
    lines.push("ACTIONS TAKEN:");
    lines.push(blankOrWrap(aar.actionsTaken, 68));

    lines.push("-".repeat(68));
    lines.push("MEDICAL:");
    lines.push(blankOrWrap(aar.medical, 68));

    lines.push("-".repeat(68));
    lines.push("EXTRACTION / TRANSPORT:");
    lines.push(blankOrWrap(aar.extraction, 68));

    lines.push("-".repeat(68));
    lines.push("OUTCOME:");
    lines.push(blankOrWrap(aar.outcome, 68));

    lines.push("-".repeat(68));
    lines.push("RTB / DEBRIEF:");
    lines.push(blankOrWrap(aar.rtbDebrief, 68));

    lines.push("-".repeat(68));
    lines.push("UNITS ASSIGNED:");
    lines.push(assignedUnits.length ? assignedUnits.map(x => `- ${x}`).join("\n") : "(none)");

    lines.push("-".repeat(68));
    lines.push("PERSONS INVOLVED:");
    lines.push(linkedPeople.length ? linkedPeople.map(x => `- ${x}`).join("\n") : "(none)");

    lines.push("-".repeat(68));
    lines.push("TIMELINE / UPDATES:");
    lines.push(updates.length ? updates.join("\n") : "(no updates)");

    lines.push("=".repeat(68));
    lines.push("END REPORT");
    return lines.join("\n");
  }

  function blankOrWrap(text, width, indentIfBlank=false){
    const t = String(text||"").trim();
    if(!t) return indentIfBlank ? "  (none)" : "(none)";
    return wrapText(t, width);
  }

  function wrapText(text, width){
    const words = String(text).replace(/\s+/g," ").trim().split(" ");
    const out = [];
    let line = "";
    for(const w of words){
      const next = line ? (line + " " + w) : w;
      if(next.length > width){
        if(line) out.push(line);
        line = w;
      } else line = next;
    }
    if(line) out.push(line);
    return out.join("\n");
  }

  function clampInt(v){
    const n = parseInt(v,10);
    return Number.isFinite(n) && n >= 0 ? n : 0;
  }

  // Assignment/status helpers
  function assignUnitToCall(callId, unitId){
    const c = getCall(callId), u = getUnit(unitId);
    if(!c || !u) return;

    c.assignedUnitIds ??= [];
    if(!c.assignedUnitIds.includes(u.id)) c.assignedUnitIds.push(u.id);

    u.status = "ASSIGNED";
    if(c.status === "OPEN") c.status = "DISPATCHED";

    c.updates ??= [];
    c.updates.unshift({ at: Date.now(), by: session.username, text: `Unit ${u.name} assigned.` });
    addLog(`Assigned ${u.name} → ${c.id}`);
    persist();
  }

  function unassignUnitFromCall(callId, unitId){
    const c = getCall(callId), u = getUnit(unitId);
    if(!c || !u) return;

    c.assignedUnitIds = (c.assignedUnitIds||[]).filter(id => id !== u.id);
    const still = data.calls.some(x => x.status !== "CLOSED" && (x.assignedUnitIds||[]).includes(u.id));
    if(!still) u.status = "AVAILABLE";

    c.updates ??= [];
    c.updates.unshift({ at: Date.now(), by: session.username, text: `Unit ${u.name} unassigned.` });
    addLog(`Unassigned ${u.name} from ${c.id}`);
    persist();
  }

  function setCallStatus(callId, status){
    const c = getCall(callId);
    if(!c) return;
    c.status = status;

    c.updates ??= [];
    c.updates.unshift({ at: Date.now(), by: session.username, text: `Status set to ${status}.` });
    addLog(`Set ${c.id} status → ${status}`);

    if(status === "CLOSED"){
      for(const uid of (c.assignedUnitIds||[])){
        const u = getUnit(uid);
        if(!u) continue;
        const still = data.calls.some(x => x.id !== c.id && x.status !== "CLOSED" && (x.assignedUnitIds||[]).includes(u.id));
        if(!still) u.status = "AVAILABLE";
      }
    }
    persist();
  }

  // Location dropdowns
  function buildLocationDropdowns(){
    const sys = $("sysSelect"), loc = $("locSelect");
    if(!sys || !loc) return;

    sys.innerHTML = Object.keys(SC_LOCATIONS).map(s => `<option>${esc(s)}</option>`).join("");

    const fill = () => {
      const groups = SC_LOCATIONS[sys.value];
      let html = "";
      Object.keys(groups).forEach(g => {
        html += `<optgroup label="${esc(g)}">`;
        groups[g].forEach(item => html += `<option value="${esc(item)}">${esc(item)}</option>`);
        html += `</optgroup>`;
      });
      html += `<optgroup label="Other"><option value="(Custom / Not Listed)">(Custom / Not Listed)</option></optgroup>`;
      loc.innerHTML = html;
    };
    sys.addEventListener("change", fill);
    fill();
  }

  // Cards
  function callCard(c){
    const units = (c.assignedUnitIds||[]).map(id => getUnit(id)?.name).filter(Boolean).join(", ") || "None";
    const people = (c.linkedPeopleIds||[]).map(id => getPerson(id)?.handle).filter(Boolean).join(", ") || "None";
    return `
      <div class="card" id="openCall_${escAttr(c.id)}" style="cursor:pointer">
        <div class="title">
          <div class="main">${esc(c.type)} <span class="muted">•</span> ${esc(c.location)}</div>
          <div class="sub">${esc(c.id)} • ${fmtTime(c.createdAt)} • by ${esc(c.createdBy)} • ${esc(c.system||"")}</div>
        </div>
        <div class="hr"></div>
        <div class="row" style="justify-content:space-between">
          <div class="mini"><b>Units:</b> <span class="muted">${esc(units)}</span></div>
          <div class="mini">${badgePriority(c.priority)} ${badgeStatus(c.status)}</div>
        </div>
        <div class="mini" style="margin-top:6px"><b>People:</b> <span class="muted">${esc(people)}</span></div>
        <div class="hr"></div>
        <div class="mini muted">${esc((c.details||"(no details)").slice(0,220))}${(c.details||"").length>220?"…":""}</div>
      </div>`;
  }

  function unitCard(u){
    return `
      <div class="card">
        <div class="row" style="justify-content:space-between;align-items:flex-start">
          <div class="title"><div class="main">${esc(u.name)}</div><div class="sub">${esc(u.type)} • ${esc(u.id)}</div></div>
          <div>${badgeUnit(u.status)}</div>
        </div>
        <div class="hr"></div>
        <div class="mini muted">${esc(u.notes||"")}</div>
      </div>`;
  }

  function personCard(p){
    return `
      <div class="card">
        <div class="title"><div class="main">${esc(p.handle)}</div><div class="sub">${esc(p.org||"")} • ${esc(p.tags||"")} • ${esc(p.id)}</div></div>
        <div class="hr"></div>
        <div class="mini muted"><b>Last note:</b> ${esc(p.notes?.[0]?.text || "(none)")}</div>
      </div>`;
  }

  // Badges
  function badgePriority(p){
    if(p==="CRITICAL") return `<span class="badge bad">P:${esc(p)}</span>`;
    if(p==="HIGH") return `<span class="badge warn">P:${esc(p)}</span>`;
    return `<span class="badge">P:${esc(p)}</span>`;
  }
  function badgeStatus(s){
    if(s==="OPEN") return `<span class="badge warn">${esc(s)}</span>`;
    if(s==="DISPATCHED"||s==="ON_SCENE") return `<span class="badge good">${esc(s)}</span>`;
    if(s==="CLOSED") return `<span class="badge">${esc(s)}</span>`;
    return `<span class="badge">${esc(s)}</span>`;
  }
  function badgeUnit(s){
    if(s==="AVAILABLE") return `<span class="badge good">${esc(s)}</span>`;
    if(s==="OUT_OF_SERVICE") return `<span class="badge bad">${esc(s)}</span>`;
    if(s==="ON_SCENE") return `<span class="badge good">${esc(s)}</span>`;
    return `<span class="badge warn">${esc(s)}</span>`;
  }

  // Data helpers
  function newId(prefix){ data.nextId = (data.nextId || 1000) + 1; return `${prefix}-${data.nextId}`; }
  function getCall(id){ return data.calls.find(c=>c.id===id) || null; }
  function getUnit(id){ return data.units.find(u=>u.id===id) || null; }
  function getPerson(id){ return data.people.find(p=>p.id===id) || null; }

  function addLog(action){
    data.log.unshift({ at: Date.now(), by: session?.username || "SYSTEM", action });
    data.log = data.log.slice(0, 200);
  }

  function notesText(p){ return (p.notes||[]).map(n=>n.text).join(" "); }

  function callBlob(c){
    const units = (c.assignedUnitIds||[]).map(id => getUnit(id)?.name || "").join(" ");
    const ppl = (c.linkedPeopleIds||[]).map(id => getPerson(id)?.handle || "").join(" ");
    const aar = c.aar || {};
    return `${c.id} ${c.status} ${c.type} ${c.priority} ${c.system||""} ${c.location} ${c.details||""} ${units} ${ppl} ${aar.commandSummary||""} ${aar.outcome||""}`.toLowerCase();
  }

  // Sample
  function seedSample(){
    if(data.units.length === 0){
      data.units.push(
        { id:newId("U"), name:"S1", type:"PATROL", status:"AVAILABLE", notes:"Stanton 1 • multi-role" },
        { id:newId("U"), name:"MED-1", type:"MEDICAL", status:"AVAILABLE", notes:"Cutlass Red / Terrapin med bed" }
      );
      addLog("Seeded sample units");
    }
    if(data.people.length === 0){
      data.people.push(
        { id:newId("P"), handle:"Umbreeeon", org:"Medrunner / Security", tags:"pilot, lead", notes:[] },
        { id:newId("P"), handle:"Unknown Victim", org:"Civilian", tags:"victim", notes:[] }
      );
      addLog("Seeded sample people");
    }
    const c1 = {
      id: newId("C"),
      createdAt: Date.now(),
      createdBy: session.username,
      status: "OPEN",
      system: "Stanton",
      type: "Distress Beacon",
      priority: "HIGH",
      location: "Everus Harbor (Hurston)",
      details: "Beacon received near hangar approach. Possible hostile presence. Caller reports injury + ship disabled.",
      assignedUnitIds: [],
      linkedPeopleIds: [],
      updates: [{ at: Date.now(), by: "SYSTEM", text: "Call created (sample)." }],
      aar: { commandSummary:"", aoNotes:"", threatsPveCount:2, threatsPveNotes:"NPCs near pad access", threatsPvpCount:0, threatsPvpNotes:"",
             actionsTaken:"", medical:"", extraction:"", outcome:"", rtbDebrief:"" }
    };
    data.calls.push(c1);
    addLog("Seeded sample call");
  }

  // Settings import/export
  function download(filename, text, mime){
    const blob = new Blob([text], {type:mime});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importJSON(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.onchange = async () => {
      const f = input.files?.[0];
      if(!f) return;
      try{
        const parsed = JSON.parse(await f.text());
        if(!parsed || !parsed.calls || !parsed.units || !parsed.people || !parsed.log){
          toast("Invalid CAD JSON."); return;
        }
        data = parsed; normalizeData();
        addLog("Imported JSON (replaced data)");
        persist(); renderAll(); toast("Imported.");
      }catch{ toast("Import failed."); }
    };
    input.click();
  }

  // Toast / utils
  let toastTimer = null;
  function toast(msg){
    UI.toast.textContent = msg;
    UI.toast.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> UI.toast.style.display="none", 2200);
  }
  function fmtTime(ts){
    const d = new Date(ts);
    return d.toLocaleString(undefined, {hour12:true, year:"numeric", month:"short", day:"2-digit", hour:"2-digit", minute:"2-digit"});
  }
  function loadJSON(key, fallback){
    try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch{ return fallback; }
  }
  function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch{} }
  function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }
});
</script>
