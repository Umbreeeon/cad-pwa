<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CAD v16</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb; margin:0; }
.card { background:#111827; padding:16px; margin:10px; border-radius:10px; }
.title { font-size:18px; margin-bottom:10px; }
.field { margin-bottom:10px; }
.row { display:flex; gap:10px; }
select, input { width:100%; padding:8px; border-radius:6px; border:none; }
.btn { padding:10px; border:none; border-radius:6px; cursor:pointer; }
.primary { background:#2563eb; color:white; }
.board { padding:10px; }
.call { background:#1f2937; padding:10px; margin-bottom:10px; border-radius:8px; }
.small { font-size:12px; opacity:0.7; }
</style>
</head>

<body>

<div id="app"></div>

<script>
/* ================= STORAGE ================= */
const LS = { data: "cad_data_v16" };

let data = JSON.parse(localStorage.getItem(LS.data)) || {
  units: [],
  calls: []
};

let session = { username: "ADMIN" };

function save(){
  localStorage.setItem(LS.data, JSON.stringify(data));
}

/* ================= NAV ================= */
let activeTab = "dispatch";

function render(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <button class="btn" onclick="switchTab('dispatch')">Dispatch</button>
      <button class="btn" onclick="switchTab('new')">New Call</button>
      <button class="btn" onclick="switchTab('units')">Units</button>
      <button class="btn" onclick="switchTab('report')">Report</button>
    </div>

    <div id="view"></div>
  `;

  if(activeTab==="dispatch") renderDispatch();
  if(activeTab==="new") renderNewCall();
  if(activeTab==="units") renderUnits();
  if(activeTab==="report") renderReport();
}

function switchTab(tab){
  activeTab = tab;
  render();
}

/* ================= NEW CALL ================= */
function renderNewCall(){
  document.getElementById("view").innerHTML = `
    <div class="card">
      <div class="title">New Call</div>

      <div class="field">
        <label>Description</label>
        <input id="cDesc">
      </div>

      <button class="btn primary" onclick="addCall()">Create Call</button>
    </div>
  `;
}

function addCall(){
  const desc = document.getElementById("cDesc").value;

  const call = {
    id: Date.now(),
    desc,
    createdBy: "ADMIN",
    log: [`Call created by ADMIN`]
  };

  data.calls.push(call);
  save();
  switchTab("dispatch");
}

/* ================= DISPATCH ================= */
function renderDispatch(){
  const list = data.calls.map(c => `
    <div class="call">
      <strong>${c.desc}</strong><br>
      <div class="small">by ADMIN</div>

      ${c.log.map(l=>`<div class="small">${l}</div>`).join("")}

      <button class="btn" onclick="addUpdate(${c.id})">Add Update</button>
    </div>
  `).join("");

  document.getElementById("view").innerHTML = `
    <div class="card">
      <div class="title">Dispatch Board</div>
      ${list}
    </div>
  `;
}

function addUpdate(id){
  const call = data.calls.find(c=>c.id===id);
  const txt = prompt("Update:");
  if(!txt) return;

  call.log.push(`${txt} (by ADMIN)`);
  save();
  render();
}

/* ================= UNITS ================= */
function renderUnits(){
  document.getElementById("view").innerHTML = `
    <div class="card">
      <div class="title">Units</div>

      <div class="field">
        <label>Unit Name</label>
        <select id="uName">
          <option value="">Select unit…</option>

          <option>S1/Gunship</option>
          <option>S1/Medship</option>
          <option>S1/CAP-1</option>
          <option>S1/CAP-2</option>
          <option>S1/CAP-3</option>
          <option>S1/CAP-4</option>

          <option>S2/Gunship</option>
          <option>S2/Medship</option>
          <option>S2/CAP-1</option>
          <option>S2/CAP-2</option>
          <option>S2/CAP-3</option>
          <option>S2/CAP-4</option>

          <option>S3/Gunship</option>
          <option>S3/Medship</option>
          <option>S3/CAP-1</option>
          <option>S3/CAP-2</option>
          <option>S3/CAP-3</option>
          <option>S3/CAP-4</option>
        </select>
      </div>

      <div class="field">
        <label>Status</label>
        <select id="uStatus">
          <option>AVAILABLE</option>
          <option>EN_ROUTE</option>
          <option>ON_SCENE</option>
        </select>
      </div>

      <button class="btn primary" onclick="addUnit()">Add Unit</button>
    </div>

    <div class="card">
      <div class="title">Active Units</div>
      ${data.units.map(u=>`
        <div class="call">
          ${u.name}<br>
          ${u.status}<br>
          <div class="small">by ADMIN</div>
        </div>
      `).join("")}
    </div>
  `;
}

function addUnit(){
  const name = document.getElementById("uName").value;
  if(!name) return alert("Select unit");

  data.units.push({
    name,
    status: document.getElementById("uStatus").value
  });

  save();
  render();
}

/* ================= REPORT ================= */
function renderReport(){
  document.getElementById("view").innerHTML = `
    <div class="card">
      <div class="title">Report Generator</div>

      <select id="rCall">
        ${data.calls.map(c=>`<option value="${c.id}">${c.desc}</option>`).join("")}
      </select>

      <button class="btn primary" onclick="generateReport()">Generate</button>

      <pre id="reportOut"></pre>
    </div>
  `;
}

function generateReport(){
  const id = document.getElementById("rCall").value;
  const c = data.calls.find(x=>x.id==id);

  const report = `
CALL: ${c.desc}
DISPATCHER: ADMIN

LOG:
${c.log.join("\n")}
  `;

  document.getElementById("reportOut").textContent = report;
}

/* ================= INIT ================= */
render();

</script>

</body>
</html>
